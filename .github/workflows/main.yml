name: Deploy Static Web to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/tanapat041

      - name: Deploy to GitHub Pages
        uses: peaceiris/tanapat041
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./