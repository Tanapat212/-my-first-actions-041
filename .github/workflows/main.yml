name: Deploy Static Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: actions/Tanapat-041
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: actions/gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./